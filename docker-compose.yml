version: '3.8'

services:
  vue-test-website:
    image: umutayb/vue-test-site:latest
    restart: always
    ports:
      - "7457:8080"
    networks:
      - vue-network

  app-mongodb:
    image: mongo:7
    restart: always
    networks:
      - app-network
    volumes:
      - app-mongo-data:/data/db

  app-backend:
    image: umutayb/book-hive-backend:latest
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - app-mongodb
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://app-mongodb:27017/app
      JWT_SECRET: element-interactions-test-secret-key-at-least-sixty-four-bytes-long
    networks:
      - app-network

networks:
  vue-network:
    driver: bridge
  app-network:
    driver: bridge

volumes:
  app-mongo-data:
