name: 🧪 Test, Verify & Coverage

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

permissions:
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 🗂️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: 🧩 Install dependencies
        run: npm ci

      - name: 🛠️ Build package
        run: npm run build

      - name: 🌍 Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: 🐳 Start Unit Test Website
        run: |
          docker compose up --build -d

      - name: 🧪 Run Tests
        run: npm test

      - name: 📝 Check Types
        run: npx tsc --noEmit

      - name: 📊 Run API Coverage Report
        id: coverage
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: npm run test:coverage

      - name: 💬 Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('api-coverage-report.txt', 'utf-8');

            const body = `## 📊 API Coverage Report\n\n\`\`\`\n${report.trim()}\n\`\`\`\n\n<sub>Generated by \`npm run test:coverage\`</sub>`;

            // Find existing coverage comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('API Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: ❌ Fail if coverage is not 100%
        if: github.event_name == 'pull_request' && steps.coverage.outcome == 'failure'
        run: |
          echo "API coverage is not 100%. See the coverage report comment on this PR."
          exit 1
